name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t fastapi-app .

      - name: Run Container
        shell: pwsh
        run: |
          docker stop fastapi-app -ErrorAction SilentlyContinue
          docker rm fastapi-app -ErrorAction SilentlyContinue
          docker run -d -p 8000:8000 --name fastapi-app fastapi-app
